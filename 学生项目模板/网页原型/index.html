<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 分钟微型游戏原型</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>3 分钟微型游戏原型</h1>
      <p>这里是起始页面。请根据你的设计方向，把它改成一个简单能玩的版本。</p>
    </header>

    <section class="panel">
      <h2>游戏目标</h2>
      <p id="goalText">请在这里呈现你的游戏目标。</p>
    </section>

    <section class="panel">
      <h2>游戏区</h2>
      <div id="gameArea" class="game-area">
        <p id="gamePrompt">请把这里改成你的核心玩法区域。</p>
      </div>
      <div class="status">
        <span>状态：<strong id="statusText">未开始</strong></span>
      </div>
      <div class="controls">
        <button id="startBtn" type="button">开始</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
